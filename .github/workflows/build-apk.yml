name: Build Demo APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npm run cap:add:android
          fi

      - name: Sync Capacitor
        run: npm run cap:sync

      - name: Ensure camera permission in Android manifest
        run: |
          python - <<'PY'
          from pathlib import Path
          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")
          if "android.permission.CAMERA" not in text:
              insert = '\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n'
              text = text.replace("</manifest>", insert + "</manifest>")
              manifest.write_text(text, encoding="utf-8")
          PY

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agape-kids-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create Release with APK
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          tag_name: v${{ github.run_number }}
          release_name: Agape Kids APK v${{ github.run_number }}
          body: |
            # Agape Kids - Android APK
            
            **Build Date**: ${{ github.event.head_commit.timestamp }}
            **Latest Changes**: Daily scripture popup with 20 Bible verses, improved dark mode, smooth animations, and confetti celebrations!
            
            ## 📲 Installation Instructions
            
            1. Download the APK file below
            2. Transfer to your Android phone
            3. Open file manager and tap the APK file
            4. Tap "Install" (enable "Unknown Sources" if prompted)
            5. App opens - ready to use! 🎉
            
            ## ✨ Features
            - ✅ Daily scripture with beautiful popup
            - ✅ Improved dark mode for comfortable reading
            - ✅ Smooth animations & transitions
            - ✅ Confetti celebrations for milestones
            - ✅ Full offline support
            - ✅ Child check-in/check-out system
            - ✅ Attendance tracking & reports
            - ✅ Points and rewards system
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
